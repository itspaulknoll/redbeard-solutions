<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Impact Map | Countryside Next Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .map-bg { background: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('https://api.mapbox.com/styles/v1/mapbox/dark-v10/static/-82.75,27.96,10,0/600x400?access_token=pk.eyJ1Ijoiam9obmRvZSIsImEiOiJjbTF2eGZ3bmwwZzFyMmpxMmZ3bmwwZzFyIn0.placeholder'); background-size: cover; height: 300px; border-radius: 1.5rem; border: 1px solid #334155; }
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
    </style>
</head>
<body class="p-6">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-black uppercase tracking-tighter text-green-400">The Impact Map</h1>
        <p class="text-slate-400 text-sm">Countryside Next Gen // Clearwater Movement</p>
    </header>

    <div class="map-bg glow-green mb-8 flex items-center justify-center">
        <div class="text-center p-4 bg-slate-900/80 rounded-xl border border-slate-700">
            <p class="text-4xl font-black text-white">1,284</p>
            <p class="text-xs uppercase tracking-widest text-green-400 font-bold">Kingdom Acts Logged</p>
        </div>
    </div>

    <section class="space-y-4">
        <button class="w-full bg-green-500 hover:bg-green-600 text-slate-900 font-black py-4 rounded-xl uppercase tracking-wider transition-all transform active:scale-95">
            <i class="fa-solid fa-location-dot mr-2"></i> Log a Kingdom Act
        </button>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <i class="fa-solid fa-hands-helping text-green-400 mb-2"></i>
                <p class="text-xs text-slate-400 uppercase font-bold">Serving</p>
                <p class="text-xl font-bold">412</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <i class="fa-solid fa-heart text-green-400 mb-2"></i>
                <p class="text-xs text-slate-400 uppercase font-bold">Community</p>
                <p class="text-xl font-bold">872</p>
            </div>
        </div>

        <div class="bg-slate-800 p-5 rounded-xl border border-slate-700">
            <h2 class="font-bold text-sm uppercase tracking-widest text-slate-400 mb-4">Live Activity Feed</h2>
            <div class="space-y-3">
                <div class="flex items-center text-sm">
                    <div class="w-2 h-2 rounded-full bg-green-400 mr-3 animate-pulse"></div>
                    <p><span class="font-bold text-green-400">Jacob</span> served at <span class="text-white underline">Helping Hands</span></p>
                </div>
                <div class="flex items-center text-sm">
                    <div class="w-2 h-2 rounded-full bg-green-400 mr-3 animate-pulse"></div>
                    <p><span class="font-bold text-green-400">Sarah</span> shared a Bible plan in <span class="text-white underline">Palm Harbor</span></p>
                </div>
                <div class="flex items-center text-sm">
                    <div class="w-2 h-2 rounded-full bg-green-400 mr-3 animate-pulse"></div>
                    <p><span class="font-bold text-green-400">Leo</span> invited 3 friends to <span class="text-white underline">Midweek</span></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="mt-12 text-center text-[10px] text-slate-500 uppercase tracking-[0.2em]">
        Next Gen Strategy by Redbeard Solutions
    </footer>
</body>
</html>
