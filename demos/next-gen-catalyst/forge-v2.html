<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Gen Forge v2 | Countryside Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass { background: white; border: 1px solid #e2e8f0; }
        #loading { display: none; }
        #output { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-slate-900 text-white p-6 shadow-xl">
        <div class="max-w-3xl mx-auto flex items-center gap-4">
            <div class="bg-green-500 p-3 rounded-xl shadow-lg shadow-green-500/20">
                <i class="fa-solid fa-microchip text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Next Gen Forge <span class="text-green-400">v2</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Real-Time Contextual Generation</p>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-12">
        
        <div class="glass p-8 rounded-3xl shadow-sm mb-8">
            <label class="block text-sm font-black uppercase tracking-widest text-slate-400 mb-4">Input Sermon Topic or Scripture</label>
            <textarea id="userInput" class="w-full h-32 p-4 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-green-500 focus:outline-none transition-all mb-4" placeholder="Type something like 'Loving your enemy' or 'Armor of God'..."></textarea>
            <button onclick="simulateForge()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest shadow-lg shadow-green-500/20 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Generate Custom Pack
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-12">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-green-500 mb-4"></i>
            <p class="text-slate-400 font-black uppercase text-xs tracking-[0.2em]">AI is analyzing your notes...</p>
        </div>

        <!-- Dynamic Output -->
        <div id="output" class="space-y-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="h-px bg-slate-200 flex-grow"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Contextual Generation Complete</span>
                <div class="h-px bg-slate-200 flex-grow"></div>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-pink-500">
                <h3 class="font-black text-pink-600 uppercase text-xs tracking-widest mb-4"><i class="fa-brands fa-tiktok mr-2"></i> TikTok Script</h3>
                <p id="tiktokOutput" class="text-sm text-slate-700 italic font-medium"></p>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                <h3 class="font-black text-blue-600 uppercase text-xs tracking-widest mb-4"><i class="fa-solid fa-envelope mr-2"></i> Parent Email</h3>
                <p id="emailOutput" class="text-sm text-slate-700"></p>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-slate-900">
                <h3 class="font-black text-slate-900 uppercase text-xs tracking-widest mb-4"><i class="fa-solid fa-users mr-2"></i> Discussion Questions</h3>
                <ul id="questionsOutput" class="list-disc list-inside text-sm text-slate-600 space-y-2"></ul>
            </div>
        </div>
    </main>

    <script>
        function simulateForge() {
            const topic = document.getElementById('userInput').value || "the Gospel";
            document.getElementById('loading').style.display = 'block';
            document.getElementById('output').style.display = 'none';

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('output').style.display = 'block';

                // Contextual TikTok Script
                document.getElementById('tiktokOutput').innerText = `"Real talk: People think '${topic}' is just for Sunday. But Pastor Marcelo just challenged us to take it into the halls of our schools. If your faith doesn't change how you treat people on Monday, is it even real? #countrysideyth #clearwater #nextgen"`;

                // Contextual Email
                document.getElementById('emailOutput').innerHTML = `<strong>Subject: Midweek Momentum // ${topic}</strong><br><br>Hi Parents! This week we challenged our students to move beyond the surface of ${topic}. We're not just teaching lessons; we're raising leaders. Ask your student tonight: 'How can you apply ${topic} to one situation you're facing this week?'`;

                // Contextual Questions
                const questions = [
                    `Why do you think the world struggles with ${topic}?`,
                    `What is one practical way we can live out ${topic} at home?`,
                    `If we truly believed in ${topic}, how would our school look different?`
                ];
                const qList = document.getElementById('questionsOutput');
                qList.innerHTML = '';
                questions.forEach(q => {
                    const li = document.createElement('li');
                    li.innerText = q;
                    qList.appendChild(li);
                });

                window.scrollTo({ top: document.getElementById('output').offsetTop, behavior: 'smooth' });
            }, 1500);
        }
    </script>

</body>
</html>
